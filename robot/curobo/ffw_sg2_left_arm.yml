# CuRobo robot config for FFW-SG2 left arm (7-DOF)
#
# urdf_path and asset_root_path use relative paths (to repo root).
# The example script resolves them to absolute paths before loading.
#
# Planning scope: left arm only (arm_l_joint1..7).
# All other joints (mobile base, lift, head, right arm, grippers) are locked.

robot_cfg:
  kinematics:
    format_version: 2.0

    urdf_path: robot/urdf/ffw_sg2_processed.urdf        # generated by curobo_motion.py
    asset_root_path: robot/urdf

    base_link: base_link
    tool_frames:
      - arm_l_link7

    # Links included in collision checking
    collision_link_names:
      - base_link
      - arm_base_link
      - arm_l_link1
      - arm_l_link2
      - arm_l_link3
      - arm_l_link4
      - arm_l_link5
      - arm_l_link6
      - arm_l_link7

    collision_sphere_buffer: 0.0

    self_collision_buffer:
      base_link: 0.0
      arm_base_link: 0.05
      arm_l_link1: 0.0
      arm_l_link2: 0.0
      arm_l_link3: 0.0
      arm_l_link4: 0.0
      arm_l_link5: 0.0
      arm_l_link6: 0.0
      arm_l_link7: 0.0

    self_collision_ignore:
      base_link:
        - arm_base_link
        - lift_link
      arm_base_link:
        - arm_l_link1
        - arm_r_link1
        - head_link1
      arm_l_link1:
        - arm_l_link2
      arm_l_link2:
        - arm_l_link3
      arm_l_link3:
        - arm_l_link4
      arm_l_link4:
        - arm_l_link5
      arm_l_link5:
        - arm_l_link6
      arm_l_link6:
        - arm_l_link7

    # Only lock joints that are in the kinematic chain to the EE.
    # Joints in branches (head, right arm, wheels, grippers) are invisible
    # to CuRobo since it only parses the chain from base_link to tool_frame.
    lock_joints:
      lift_joint: 0.0

    use_global_cumul: true

    cspace:
      joint_names:
        - arm_l_joint1
        - arm_l_joint2
        - arm_l_joint3
        - arm_l_joint4
        - arm_l_joint5
        - arm_l_joint6
        - arm_l_joint7
      # Home/retract config (respects joint limits: joint2 must be ≥ 0)
      default_joint_position: [0.0, 0.5, 0.0, -1.2, 0.0, 0.5, 0.0]
      null_space_weight: [1, 1, 1, 1, 1, 1, 1]
      cspace_distance_weight: [1, 1, 1, 1, 1, 1, 1]
      max_acceleration: 10.0
      max_jerk: 300.0

    # Collision spheres — approximate each link with 2-3 spheres.
    # Centers are in each link's local frame; radii in metres.
    collision_spheres:
      base_link:
        - center: [0.0, 0.0, 0.6]
          radius: 0.18
        - center: [0.0, 0.0, 1.0]
          radius: 0.15
      arm_base_link:
        - center: [0.0,  0.0,   0.0]
          radius: 0.12
        - center: [0.0,  0.08,  0.0]
          radius: 0.07
        - center: [0.0, -0.08,  0.0]
          radius: 0.07
      arm_l_link1:
        - center: [0.0, 0.04, 0.0]
          radius: 0.055
        - center: [0.0, 0.10, 0.0]
          radius: 0.05
      arm_l_link2:
        - center: [0.0, 0.0, -0.055]
          radius: 0.05
        - center: [0.0, 0.0, -0.115]
          radius: 0.05
        - center: [0.0, 0.0, -0.155]
          radius: 0.05
      arm_l_link3:
        - center: [0.01,  0.0, -0.04]
          radius: 0.04
        - center: [0.025, 0.0, -0.09]
          radius: 0.04
        - center: [0.038, 0.0, -0.12]
          radius: 0.04
      arm_l_link4:
        - center: [-0.01, 0.0, -0.05]
          radius: 0.04
        - center: [-0.03, 0.0, -0.10]
          radius: 0.04
        - center: [-0.04, 0.0, -0.14]
          radius: 0.04
      arm_l_link5:
        - center: [0.0, 0.0, -0.035]
          radius: 0.04
        - center: [0.0, 0.0, -0.085]
          radius: 0.04
      arm_l_link6:
        - center: [0.0, 0.0, -0.03]
          radius: 0.04
        - center: [0.0, 0.0, -0.075]
          radius: 0.035
      arm_l_link7:
        - center: [0.0, 0.0, -0.03]
          radius: 0.04
        - center: [0.0, 0.0, -0.07]
          radius: 0.035
        - center: [0.0, 0.0, -0.11]
          radius: 0.03
