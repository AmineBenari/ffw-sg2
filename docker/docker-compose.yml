services:
  ffw-sg2-planner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ffw-sg2-planner:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY}
    network_mode: host
    volumes:
      - ..:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    stdin_open: true
    tty: true
